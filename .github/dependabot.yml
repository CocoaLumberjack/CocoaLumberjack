version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    open-pull-requests-limit: 10
    schedule:
      interval: weekly
      day: tuesday
    cooldown:
      default-days: 3

  - package-ecosystem: swift
    directory: /
    open-pull-requests-limit: 10
    schedule:
      interval: weekly
      day: tuesday
    cooldown:
      default-days: 1
